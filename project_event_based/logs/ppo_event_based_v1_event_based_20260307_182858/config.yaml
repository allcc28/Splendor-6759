checkpoints:
  name_prefix: ppo_event_based
  save_path: logs/checkpoints
  save_replay_buffer: false
  save_vecnormalize: false
deterministic_actions: false
device: auto
environment:
  combine_event_and_score: false
  max_turns: 120
  name: SplendorEventBased
  opponent: random
  reward_mode: event_based
evaluation:
  callback_on_eval: false
  deterministic: true
  render: false
experiment:
  name: ppo_event_based_v1
  notes: Event-based reward shaping experiment (isolated)
  tags:
  - ppo
  - event_based
  - phase2
ppo:
  batch_size: 64
  clip_range: 0.2
  clip_range_vf: null
  ent_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  lr_schedule: constant
  max_grad_norm: 0.5
  n_epochs: 10
  n_steps: 2048
  normalize_advantage: true
  policy: MlpPolicy
  policy_kwargs:
    activation_fn: relu
    net_arch:
    - 256
    - 256
    - 128
  vf_coef: 0.5
reward:
  event_weights:
  - 0.01
  - 0.4
  - -0.05
  - 1.0
  - 100.0
  - 0.3
  - 0.8
  - 0.5
  - 3.0
  mode: event_based
seed: 42
training:
  eval_episodes: 10
  eval_freq: 10000
  log_interval: 10
  save_freq: 50000
  tensorboard_log: logs/tensorboard
  total_timesteps: 1000000
  verbose: 1
