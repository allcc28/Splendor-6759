environment:
  name: SplendorEventBased
  reward_mode: event_based
  max_turns: 150
  opponent: greedy
  combine_event_and_score: true
reward:
  mode: event_based
  event_weights:
  - 0.01
  - 5.0
  - -0.5
  - 8.0
  - 50.0
  - 0.2
  - 1.0
  - 2.0
  - 5.0
ppo:
  learning_rate: 0.0003
  lr_schedule: constant
  n_steps: 1024
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  normalize_advantage: true
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy: MlpPolicy
  policy_kwargs:
    net_arch:
    - 256
    - 256
    - 128
    activation_fn: relu
training:
  total_timesteps: 1000000
  eval_freq: 10000
  eval_episodes: 10
  save_freq: 50000
  log_interval: 10
  tensorboard_log: logs/tensorboard
  verbose: 1
checkpoints:
  save_path: logs/checkpoints
  name_prefix: ppo_event_based
  save_replay_buffer: false
  save_vecnormalize: false
evaluation:
  deterministic: true
  render: false
  callback_on_eval: false
experiment:
  name: ppo_event_based_v1
  tags:
  - ppo
  - event_based
  - phase2
  notes: Event-based reward shaping experiment (isolated)
device: auto
seed: 44
deterministic_actions: false
