# E4 Ablation: Mixed-opponent training.
# Goal: improve generalization by training against a mixture instead of random-only.
# Stage A: 300k steps, quick-eval n=200 vs Random(wrapper)/RandomAgent/GreedyAgent.

environment:
  name: "SplendorMaskableEventBased"
  reward_mode: "score_progress"
  max_turns: 120
  opponent: "mixed"
  opponent_mix:
    agents: ["random_agent", "greedy_agent"]
    probs: [0.7, 0.3]
    seed: 42

event_shaping:
  enabled: true
  combine_with_score: true
  include_gem_gaps: true
  append_last_event: true
  log_freq: 10000
  # Keep V5-lite weights so E4 isolates opponent-distribution effect.
  weights: [0.01, 6.0, 0.10, 5.0, 10.0, 0.20, 1.0, 3.0, 3.0]

ppo:
  learning_rate: 0.0003
  lr_schedule: "constant"
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  normalize_advantage: true
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch:
      - 256
      - 256
      - 128
    activation_fn: "relu"

training:
  total_timesteps: 300000
  eval_freq: 10000
  eval_episodes: 10
  save_freq: 50000
  log_interval: 10
  tensorboard_log: "logs/tensorboard"
  verbose: 1

checkpoints:
  save_path: "logs/checkpoints"
  name_prefix: "maskable_ppo_event_e4"
  save_replay_buffer: false
  save_vecnormalize: false

evaluation:
  deterministic: true
  render: false
  use_masking: true

experiment:
  name: "maskable_ppo_event_e4_mixed_opp"
  tags:
    - "maskable_ppo"
    - "event_based"
    - "ablation"
    - "mixed_opponent"
    - "stage_a"
