experiment:
  name: "alphazero_v2_smoke"
  tags:
    - "alphazero"
    - "v2"
    - "smoke"

network:
  policy_size: 2048
  trunk_channels: 128
  num_res_blocks: 3

mcts:
  num_simulations: 25
  c_puct: 1.5
  dirichlet_alpha: 0.1
  dirichlet_epsilon: 0.25
  max_turns: 120
  temperature_cutoff: 20
  fpu_value: -0.1

training:
  seed: 42
  device: "cpu"
  iterations: 3
  episodes_per_iteration: 2
  replay_buffer_size: 500
  batch_size: 32
  train_epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  checkpoint_every: 1
  use_adapter: true
