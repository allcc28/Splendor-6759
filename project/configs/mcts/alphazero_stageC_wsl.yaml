experiment:
  name: "alphazero_stageC_wsl"
  tags:
    - "alphazero"
    - "mcts"
    - "self_play"
    - "stage_c"

network:
  policy_size: 2048
  trunk_channels: 128
  num_res_blocks: 3

mcts:
  num_simulations: 100
  c_puct: 1.5
  dirichlet_alpha: 0.1
  dirichlet_epsilon: 0.25
  max_turns: 120
  temperature_cutoff: 30

training:
  seed: 42
  device: "cuda"
  iterations: 60
  episodes_per_iteration: 8
  replay_buffer_size: 2000
  batch_size: 96
  train_epochs: 3
  learning_rate: 0.0005
  weight_decay: 0.0001
  checkpoint_every: 5
