experiment:
  name: "alphazero_v1_baseline"
  tags:
    - "alphazero"
    - "mcts"
    - "self_play"

network:
  policy_size: 2048
  trunk_channels: 128
  num_res_blocks: 3

mcts:
  num_simulations: 100
  c_puct: 1.5
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  max_turns: 120
  temperature_cutoff: 20

training:
  seed: 42
  device: "cpu"
  iterations: 5
  # Use --resume <checkpoint.pt> and optionally --iterations N to continue runs.
  episodes_per_iteration: 4
  batch_size: 64
  train_epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  checkpoint_every: 1
